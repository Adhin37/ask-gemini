<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ask Gemini</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup">

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <!-- ── Header ── -->
    <header class="header">
      <div class="logo">
        <div class="logo-icon">
          <svg width="26" height="26" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="bubbleG" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#f5f3ff"/>
                <stop offset="100%" stop-color="#e8e4ff"/>
              </linearGradient>
              <filter id="starGlow" x="-60%" y="-60%" width="220%" height="220%">
                <feGaussianBlur stdDeviation="1.4" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>
            <rect x="3" y="7" width="22" height="16" rx="4.5" ry="4.5" fill="url(#bubbleG)" opacity="0.96"/>
            <path d="M8 23 L6 29 L13 23 Z" fill="url(#bubbleG)" opacity="0.96"/>
            <circle cx="10.5" cy="15" r="1.6" fill="#6c4bc8"/>
            <circle cx="14"   cy="15" r="1.9" fill="#6c4bc8"/>
            <circle cx="17.5" cy="15" r="1.4" fill="#6c4bc8"/>
            <g filter="url(#starGlow)">
              <circle cx="27" cy="9" r="5" fill="#c084fc" opacity="0.25"/>
              <path d="M27 3 C27 3 27.9 6.9 30.5 8 C27.9 9.1 27 13 27 13 C27 13 26.1 9.1 23.5 8 C26.1 6.9 27 3 27 3Z" fill="#e8d5ff"/>
              <circle cx="27" cy="8" r="1.2" fill="#ffffff"/>
            </g>
            <path d="M2 21 C2 21 2.5 22.9 4 23.5 C2.5 24.1 2 26 2 26 C2 26 1.5 24.1 0 23.5 C1.5 22.9 2 21 2 21Z" fill="#b8a4f0" opacity="0.7"/>
          </svg>
        </div>
        <div class="logo-text">
          <span class="logo-name">Ask Gemini</span>
          <span class="logo-tag">AI Assistant</span>
        </div>
      </div>

      <div class="header-right">
        <!--
          Model switcher: 3 buttons.
          Inactive → only .model-char shows (single letter, compact).
          Active   → .model-char + .model-tail visible (animates width).
        -->
        <div class="model-switcher" id="modelSwitcher">
          <button class="model-opt" data-model="flash" title="Gemini Flash — fast, default">
            <span class="model-char">F</span><span class="model-tail">lash</span>
          </button>
          <button class="model-opt" data-model="thinking" title="Gemini Thinking — deep reasoning">
            <span class="model-char">T</span><span class="model-tail">hink</span>
          </button>
          <button class="model-opt" data-model="pro" title="Gemini Pro — advanced">
            <span class="model-char">P</span><span class="model-tail">ro</span>
          </button>
        </div>

        <div class="kofi-wrap">
          <a href="https://ko-fi.com/adhin/tip" target="_blank" class="kofi-btn">
            <svg class="kofi-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M18 8h1a4 4 0 010 8h-1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              <line x1="6" y1="1" x2="6" y2="4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <line x1="10" y1="1" x2="10" y2="4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <line x1="14" y1="1" x2="14" y2="4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
            <span class="kofi-tooltip">Buy me a coffee ☕</span>
          </a>
        </div>
      </div>
    </header>

    <!-- ── Selection banner ── -->
    <div class="sel-banner" id="selectionBanner">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
        <rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="2"/>
        <path d="M9 12l2 2 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="sel-label">Selection:</span>
      <span class="sel-text" id="selectionText"></span>
      <button class="sel-clear" id="selectionClear" title="Clear">&#x2715;</button>
    </div>

    <!-- ── Template dropdown (button-triggered only) ── -->
    <div class="tmpl-dropdown" id="tmplDropdown">
      <div class="tmpl-dropdown-header">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/>
          <rect x="14" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/>
          <rect x="3" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/>
          <rect x="14" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/>
        </svg>
        <span>Templates</span>
        <button class="tmpl-close-btn" id="tmplCloseBtn" title="Close">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none">
            <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="tmpl-list" id="tmplList"></div>
      <div class="tmpl-empty" id="tmplEmpty">
        No templates —
        <button class="tmpl-settings-link" id="tmplSettingsLink">add in Settings</button>
      </div>
    </div>

    <!-- ── Input area ── -->
    <main class="main">
      <div class="input-wrapper" id="inputWrapper">
        <textarea
          id="questionInput"
          class="question-input"
          placeholder="Ask anything… (/ for templates)"
          rows="3"
          autofocus
        ></textarea>

        <!--
          Inline AC strip — hidden by default.
          Slides in above the footer inside the input-wrapper.
          No layout shift: height animates from 0 → 28px.
        -->
        <div class="ac-strip" id="acStrip" aria-live="polite">
          <kbd class="ac-key">↹</kbd>
          <span class="ac-ghost" id="acGhost"></span>
          <span class="ac-counter" id="acCounter"></span>
          <span class="ac-esc">esc</span>
        </div>

        <div class="input-footer">
          <span class="hint" id="hint">↵ Enter to send</span>
          <button class="tmpl-trigger-btn" id="tmplTriggerBtn" title="Templates (/)">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
              <rect x="3" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/>
              <rect x="14" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/>
              <rect x="3" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/>
              <rect x="14" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/>
            </svg>
          </button>
          <button class="send-btn" id="sendBtn" title="Send to Gemini">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M22 2L15 22 11 13 2 9l20-7z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Ask</span>
          </button>
        </div>
      </div>
    </main>

    <!-- ── Footer ── -->
    <footer class="footer">
      <button class="open-btn" id="openBtn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
          <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="15,3 21,3 21,9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="10" y1="14" x2="21" y2="3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        Open Gemini
      </button>
      <button class="settings-btn" id="settingsBtn" title="Settings>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z" stroke="currentColor" stroke-width="2"/>
        </svg>
        Settings
      </button>
    </footer>

  </div>
  <script src="popup.js"></script>
</body>
</html>
