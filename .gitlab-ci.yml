stages:
  - build-release

package-extension:
  stage: build-release
  image: alpine:latest
  rules:
    - if: $CI_COMMIT_TAG
  before_script:
    - apk add --no-cache zip jq bash git
    - chmod +x package.sh
  script:
    # 1. Versioning
    - NEW_VERSION=$(echo $CI_COMMIT_TAG | sed 's/^v//')
    - jq ".version = \"$NEW_VERSION\"" manifest.json > manifest.tmp && mv manifest.tmp manifest.json
    
    # 2. Generate Changelog
    - echo "## Release $CI_COMMIT_TAG" > CHANGELOG.md
    - PREV_TAG=$(git describe --tags --abbrev=0 $CI_COMMIT_TAG^ 2>/dev/null || echo "")
    - if [ -z "$PREV_TAG" ]; then RANGE="HEAD"; else RANGE="$PREV_TAG..$CI_COMMIT_TAG"; fi
    
    - echo "### ✨ Features" >> CHANGELOG.md
    - git log $RANGE --grep="^feat" --format="* %s (%h)" >> CHANGELOG.md || echo "* No new features" >> CHANGELOG.md
    
    - echo -e "\n### 🐛 Bug Fixes" >> CHANGELOG.md
    - git log $RANGE --grep="^fix" --format="* %s (%h)" >> CHANGELOG.md || echo "* No bug fixes" >> CHANGELOG.md
    
    - echo -e "\n### ⚙️ Maintenance" >> CHANGELOG.md
    - git log $RANGE --grep="^chore\|^refactor" --format="* %s (%h)" >> CHANGELOG.md || echo "* No maintenance" >> CHANGELOG.md

    # 3. Build & Package
    - ./package.sh
    
  artifacts:
    paths:
      - ask-gemini-extension.zip
      - CHANGELOG.md
    expire_in: never

  release:
    tag_name: $CI_COMMIT_TAG
    description: CHANGELOG.md  # GitLab uses the file content for the release notes
    assets:
      links:
        - name: "ask-gemini-extension.zip"
          url: "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/file/ask-gemini-extension.zip"