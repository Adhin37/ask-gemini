<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Gemini (mock)</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Google Sans", sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    header {
      padding: 16px 24px;
      font-size: 20px;
      font-weight: 600;
      color: #89b4fa;
      border-bottom: 1px solid #313244;
    }
    .chat-area {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
    }
    .message {
      background: #313244;
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 12px;
      max-width: 80%;
    }
    .message.user { margin-left: auto; background: #45475a; }
    .input-bar {
      display: flex;
      gap: 8px;
      padding: 16px 24px;
      border-top: 1px solid #313244;
      background: #1e1e2e;
      align-items: flex-end;
    }
    /* content.js targets: div.ql-editor[contenteditable="true"] */
    .ql-editor {
      flex: 1;
      min-height: 48px;
      max-height: 200px;
      overflow-y: auto;
      background: #313244;
      border: 1px solid #45475a;
      border-radius: 24px;
      padding: 12px 18px;
      outline: none;
      font-size: 15px;
      color: #cdd6f4;
      line-height: 1.5;
      white-space: pre-wrap;
    }
    .ql-editor:empty::before {
      content: "Ask Gemini...";
      color: #585b70;
    }
    /* content.js targets: button[aria-label="Send message"] */
    button[aria-label="Send message"] {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      background: #89b4fa;
      color: #1e1e2e;
      font-size: 20px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    button[aria-label="Send message"]:hover { background: #b4befe; }
  </style>
</head>
<body>
  <header>Gemini <span style="font-size:13px;color:#585b70;font-weight:400;">(demo mock)</span></header>
  <div class="chat-area" id="chatArea"></div>
  <div class="input-bar">
    <div
      class="ql-editor"
      contenteditable="true"
      role="textbox"
      aria-label="Ask Gemini"
    ></div>
    <button aria-label="Send message" title="Send message">&#9658;</button>
  </div>

  <script>
    // Simulate receiving an injected message — mirrors what content.js does
    // so the recording shows text appearing then a response
    const editor  = document.querySelector(".ql-editor[contenteditable]");
    const sendBtn = document.querySelector("button[aria-label='Send message']");
    const chat    = document.getElementById("chatArea");

    function addMessage(text, role) {
      const div = document.createElement("div");
      div.className = "message " + role;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    sendBtn.addEventListener("click", () => {
      const text = editor.innerText.trim();
      if (!text) return;
      addMessage(text, "user");
      editor.innerText = "";
      // Fake Gemini "thinking" then responding
      setTimeout(() => {
        addMessage("Sure! Here's a summary: " + text.substring(0, 80) + "...", "assistant");
      }, 1200);
    });

    // content.js dispatches an "input" event then clicks the send button.
    // Expose a flag so tests can wait for the response to appear.
    window.__mockReady = true;
  </script>
</body>
</html>
