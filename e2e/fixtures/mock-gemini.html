<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Gemini</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #1b1b1f;
      --surface:   #28282c;
      --surface2:  #35353a;
      --border:    rgba(255,255,255,0.12);
      --text:      #e3e2e6;
      --text-dim:  rgba(227,226,230,0.55);
      --accent:    #4285f4;
      --user-bubble: #004a77;
      --radius:    28px;
    }

    html, body { height: 100%; font-family: "Google Sans", Roboto, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

    /* ── Shell ── */
    .shell { display: flex; height: 100vh; }

    /* ── Narrow sidebar ── */
    .sidebar {
      width: 56px; min-width: 56px;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; padding: 10px 0; gap: 2px;
      border-right: 1px solid var(--border);
    }
    .sidebar-btn {
      width: 40px; height: 40px; border-radius: 50%;
      background: transparent; border: none; color: var(--text-dim);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.15s;
    }
    .sidebar-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }

    /* ── Main ── */
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    /* ── Top bar ── */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px; flex-shrink: 0;
    }
    .logo-text { font-size: 20px; font-weight: 400; color: var(--text); }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .upgrade-btn-top {
      display: flex; align-items: center; gap: 6px;
      background: var(--accent); color: #fff;
      padding: 7px 16px; border-radius: 20px; border: none;
      font: 500 13px "Google Sans", sans-serif; cursor: pointer;
    }
    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, #4285f4, #a142f4);
      font-size: 12px; font-weight: 600;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }

    /* ── Chat area ── */
    .chat-area {
      flex: 1; overflow-y: auto; display: flex;
      flex-direction: column; align-items: center;
      padding: 24px 0 16px;
    }
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }

    /* ── Greeting ── */
    .greeting {
      display: flex; flex-direction: column; align-items: center;
      gap: 8px; margin: auto 0; text-align: center; padding: 0 24px;
    }
    .greeting.hidden { display: none; }
    .greeting-hi  { font-size: 28px; font-weight: 400; color: var(--text); }
    .greeting-sub { font-size: 28px; font-weight: 400; color: var(--text-dim); }

    /* ── Messages ── */
    .msg-wrap { width: 100%; max-width: 720px; padding: 0 24px; }
    .msg { display: flex; gap: 12px; padding: 12px 0; }
    .msg.user { flex-direction: row-reverse; }
    .msg-avatar {
      width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600;
    }
    .msg.user   .msg-avatar { background: linear-gradient(135deg, #4285f4, #a142f4); }
    .msg.gemini .msg-avatar { background: transparent; }
    .msg-body { max-width: 78%; }
    .msg.user   .msg-body { background: var(--user-bubble); padding: 12px 16px; border-radius: 18px 18px 4px 18px; font-size: 14.5px; line-height: 1.55; }
    .msg.gemini .msg-body { font-size: 14.5px; line-height: 1.7; color: var(--text); padding: 4px 0; }

    /* Typing dots */
    .typing-dots { display: flex; gap: 4px; padding: 6px 0; }
    .typing-dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim); animation: dot-pulse 1.2s ease-in-out infinite; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dot-pulse { 0%,80%,100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

    /* ── Input zone ── */
    .input-zone {
      flex-shrink: 0; padding: 0 20px 24px;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
    }
    .input-container {
      width: 100%; max-width: 720px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); position: relative;
    }

    /* Textarea row */
    .textarea-row { padding: 16px 16px 0; }
    rich-textarea { display: block; }
    .ql-editor {
      min-height: 26px; max-height: 180px; overflow-y: auto;
      font: 400 15px/1.5 "Google Sans", sans-serif;
      color: var(--text); outline: none; white-space: pre-wrap; word-break: break-word;
    }
    .ql-editor:empty::before { content: "Ask Gemini"; color: var(--text-dim); pointer-events: none; }

    /* Bottom controls row */
    .controls-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 8px 8px 12px;
    }
    .controls-left { display: flex; align-items: center; gap: 2px; }
    .controls-right { display: flex; align-items: center; gap: 4px; }

    .icon-btn-sm {
      height: 36px; border-radius: 18px; border: none;
      background: transparent; color: var(--text-dim); cursor: pointer;
      display: flex; align-items: center; gap: 6px; padding: 0 10px;
      font: 400 13px "Google Sans", sans-serif;
      transition: background 0.12s;
    }
    .icon-btn-sm:hover { background: rgba(255,255,255,0.08); color: var(--text); }

    /* ── Model picker trigger ──────────────────────────────────────────
       Matches real Gemini: inline button at bottom-right of input area.
       content.js targets via:
         1. [data-test-id="bard-mode-menu-button"]
         2. button.input-area-switch                                     */
    .input-area-switch {
      display: flex; align-items: center; gap: 4px;
      background: transparent; border: 1px solid var(--border);
      color: var(--text); padding: 5px 10px; border-radius: 18px;
      cursor: pointer; font: 500 13px "Google Sans", sans-serif;
      white-space: nowrap; transition: background 0.15s; flex-shrink: 0;
    }
    .input-area-switch:hover { background: rgba(255,255,255,0.08); }

    /* Send / mic button */
    .send-button {
      width: 36px; height: 36px; border-radius: 50%; border: none; flex-shrink: 0;
      background: transparent; color: var(--text-dim); cursor: default;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, color 0.2s;
    }
    .send-button .icon-send { display: none; }
    .send-button .icon-mic  { display: flex; }
    .send-button:not([disabled]) { background: var(--text); color: #000; cursor: pointer; }
    .send-button:not([disabled]) .icon-send { display: flex; }
    .send-button:not([disabled]) .icon-mic  { display: none; }

    /* ── Model menu panel ─────────────────────────────────────────────
       Mirrors Angular Material's .mat-mdc-menu-panel overlay.
       Appended to <body> when open, removed when closed.
       content.js detects closure via: !document.querySelector("button.mat-mdc-menu-item") */
    .mat-mdc-menu-panel {
      background: #2d2d31; border-radius: 16px;
      min-width: 260px; overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.08);
      z-index: 1000;
    }

    .mat-mdc-menu-group-label {
      padding: 12px 16px 6px;
      font-size: 11px; font-weight: 600;
      color: var(--text-dim); letter-spacing: 0.3px; text-transform: none;
    }

    /* Real Gemini uses button.mat-mdc-menu-item for each option */
    .mat-mdc-menu-item {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; padding: 10px 16px;
      background: transparent; border: none; color: var(--text);
      cursor: pointer; text-align: left; gap: 12px;
      font-family: "Google Sans", Roboto, sans-serif;
      transition: background 0.12s;
    }
    .mat-mdc-menu-item:hover { background: rgba(255,255,255,0.07); }

    .model-item-content { flex: 1; }
    .model-item-title {
      font-size: 14px; font-weight: 500; color: var(--text);
      display: block;
    }
    .model-item-desc {
      font-size: 11.5px; color: var(--text-dim); margin-top: 2px;
      display: block;
    }

    /* Blue circle checkmark — shown only on selected option */
    .model-item-check {
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--accent);
      display: none; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .model-item-check svg { display: block; }
    .mat-mdc-menu-item[aria-selected="true"] .model-item-check { display: flex; }

    /* Upgrade row at the bottom of the picker */
    .model-upgrade-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px 12px; border-top: 1px solid var(--border);
      gap: 12px;
    }
    .model-upgrade-title { font-size: 13px; font-weight: 500; color: var(--text); }
    .model-upgrade-desc  { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
    .upgrade-inline-btn {
      background: transparent; border: 1px solid rgba(100,200,230,0.5);
      color: #7dd3f7; padding: 4px 12px; border-radius: 12px;
      font: 500 12px "Google Sans", sans-serif; cursor: pointer;
      white-space: nowrap; flex-shrink: 0;
    }

    /* ── Chips ── */
    .chips-row {
      display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
      max-width: 700px; width: 100%;
    }
    .chips-row.hidden { display: none; }
    .chip {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); padding: 8px 16px; border-radius: 20px;
      font: 400 13px "Google Sans", sans-serif; cursor: pointer;
      transition: background 0.12s; white-space: nowrap;
    }
    .chip:hover { background: var(--surface2); }
  </style>
</head>
<body>
<div class="shell">

  <!-- ── Narrow sidebar ── -->
  <aside class="sidebar">
    <button class="sidebar-btn" title="Menu">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
    </button>
    <button class="sidebar-btn" title="New chat">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
  </aside>

  <!-- ── Main ── -->
  <div class="main">

    <!-- Top bar -->
    <div class="topbar">
      <span class="logo-text">Gemini</span>
      <div class="topbar-right">
        <button class="upgrade-btn-top">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg>
          Upgrade to Google AI Plus
        </button>
        <div class="avatar">T</div>
      </div>
    </div>

    <!-- Chat area -->
    <div class="chat-area" id="chatArea">
      <div class="greeting" id="greeting">
        <!-- Gemini 4-colour star -->
        <svg width="36" height="36" viewBox="0 0 48 48" fill="none">
          <path d="M24 4 C24.8 4 25.5 10 25.2 24 C24.8 10 24 4 24 4Z" fill="#4285f4"/>
          <path d="M24 4 C23.2 4 22.5 10 22.8 24 C23.2 10 24 4 24 4Z" fill="#4285f4"/>
          <path d="M24 44 C24.8 44 25.5 38 25.2 24 C24.8 38 24 44 24 44Z" fill="#fbbc04"/>
          <path d="M24 44 C23.2 44 22.5 38 22.8 24 C23.2 38 24 44 24 44Z" fill="#fbbc04"/>
          <path d="M44 24 C44 24.8 38 25.5 24 25.2 C38 24.8 44 24 44 24Z" fill="#34a853"/>
          <path d="M44 24 C44 23.2 38 22.5 24 22.8 C38 23.2 44 24 44 24Z" fill="#34a853"/>
          <path d="M4 24 C4 24.8 10 25.5 24 25.2 C10 24.8 4 24 4 24Z" fill="#ea4335"/>
          <path d="M4 24 C4 23.2 10 22.5 24 22.8 C10 23.2 4 24 4 24Z" fill="#ea4335"/>
        </svg>
        <p class="greeting-hi">Hi Thomas</p>
        <p class="greeting-sub">Where should we start?</p>
      </div>
    </div>

    <!-- Input zone -->
    <div class="input-zone">

      <div class="input-container" data-node-type="input-area">

        <!-- Contenteditable textarea (content.js: rich-textarea div.ql-editor[contenteditable]) -->
        <div class="textarea-row">
          <rich-textarea>
            <div
              class="ql-editor"
              contenteditable="true"
              role="textbox"
              aria-label="Ask Gemini"
              aria-multiline="true"
            ></div>
          </rich-textarea>
        </div>

        <!-- Controls row: mirrors real Gemini's bottom toolbar -->
        <div class="controls-row">
          <div class="controls-left">
            <!-- Attach (+) -->
            <button class="icon-btn-sm" title="Add files">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            </button>
            <!-- Tools -->
            <button class="icon-btn-sm" title="Tools">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z" stroke="currentColor" stroke-width="1.8"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" stroke="currentColor" stroke-width="1.8"/></svg>
              Tools
            </button>
          </div>

          <div class="controls-right">
            <!--
              Model picker trigger.
              Selectors used by content.js (in priority order):
                1. button[data-test-id="bard-mode-menu-button"]  (primary)
                2. button.input-area-switch                       (fallback)
              Label read via: [data-test-id="logo-pill-label-container"] > span
            -->
            <button
              class="input-area-switch"
              data-test-id="bard-mode-menu-button"
              aria-label="Open mode picker"
              id="modelTrigger"
            >
              <div data-test-id="logo-pill-label-container" id="modelLabel">
                <span id="modelName">Fast</span>
              </div>
              <!-- Chevron -->
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>

            <!-- Send / mic -->
            <button class="send-button" aria-label="Send message" id="sendBtn" disabled>
              <span class="icon-send" aria-hidden="true">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M12 19V5M5 12l7-7 7 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </span>
              <span class="icon-mic" aria-hidden="true">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><rect x="9" y="2" width="6" height="12" rx="3" stroke="currentColor" stroke-width="1.8"/><path d="M5 10a7 7 0 0014 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="12" y1="19" x2="12" y2="22" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
              </span>
            </button>
          </div>
        </div>
      </div>

      <!-- Action chips -->
      <div class="chips-row" id="chipsRow">
        <button class="chip">🖼️ Create image</button>
        <button class="chip">🎵 Create music</button>
        <button class="chip">Help me learn</button>
        <button class="chip">Write anything</button>
      </div>

    </div><!-- .input-zone -->
  </div><!-- .main -->
</div><!-- .shell -->

<!--
  Model picker dropdown panel.
  Mirrors Angular Material's .mat-mdc-menu-panel overlay:
  - detached from DOM when closed (so document.querySelector("button.mat-mdc-menu-item") → null)
  - appended to <body> when open
  This lets content.js reliably detect that the dropdown closed via:
    !OPTION_SELECTORS.some(s => document.querySelector(s))
-->
<div class="mat-mdc-menu-panel" id="modelMenu" role="menu" aria-label="Select model">

  <!-- Group label — matches real Gemini's "Gemini 3" header -->
  <div class="mat-mdc-menu-group-label" aria-hidden="true">Gemini 3</div>

  <!--
    Model options: button.mat-mdc-menu-item[role="menuitem"]
    content.js OPTION_SELECTORS[0] = "button.mat-mdc-menu-item"
    matchesTarget() uses opt.innerText.split('\n')[0] for the title line.
    Block <span> elements produce the newline that separates title from description.
  -->
  <button class="mat-mdc-menu-item" role="menuitem" aria-selected="true" data-model="flash" id="opt-flash">
    <div class="model-item-content">
      <span class="model-item-title">Fast</span>
      <span class="model-item-desc">Answers quickly</span>
    </div>
    <span class="model-item-check" aria-hidden="true">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><polyline points="20 6 9 17 4 12" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </span>
  </button>

  <button class="mat-mdc-menu-item" role="menuitem" aria-selected="false" data-model="thinking" id="opt-thinking">
    <div class="model-item-content">
      <span class="model-item-title">Thinking</span>
      <span class="model-item-desc">Solves complex problems</span>
    </div>
    <span class="model-item-check" aria-hidden="true">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><polyline points="20 6 9 17 4 12" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </span>
  </button>

  <button class="mat-mdc-menu-item" role="menuitem" aria-selected="false" data-model="pro" id="opt-pro">
    <div class="model-item-content">
      <span class="model-item-title">Pro</span>
      <span class="model-item-desc">Advanced maths and code with 3.1 Pro</span>
    </div>
    <span class="model-item-check" aria-hidden="true">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><polyline points="20 6 9 17 4 12" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </span>
  </button>

  <!-- Upgrade row — matches the "Google AI Plus" entry in the real picker -->
  <div class="model-upgrade-row">
    <div>
      <div class="model-upgrade-title">Google AI Plus</div>
      <div class="model-upgrade-desc">Get more access to models and features</div>
    </div>
    <button class="upgrade-inline-btn">Upgrade</button>
  </div>

</div><!-- #modelMenu (detached from DOM; appended to body on open) -->

<script>
  const editor       = document.querySelector(".ql-editor");
  const sendBtn      = document.getElementById("sendBtn");
  const chatArea     = document.getElementById("chatArea");
  const greeting     = document.getElementById("greeting");
  const chipsRow     = document.getElementById("chipsRow");
  const modelTrigger = document.getElementById("modelTrigger");
  const modelMenu    = document.getElementById("modelMenu");
  const modelName    = document.getElementById("modelName");

  // ── Model picker ──────────────────────────────────────────────────
  //
  // Angular Material overlays work by appending the panel to <body> on open
  // and removing it on close.  content.js detects the "closed" state with:
  //   !OPTION_SELECTORS.some(s => document.querySelector(s))
  // where OPTION_SELECTORS[0] = "button.mat-mdc-menu-item".
  // So we MUST detach the panel from DOM when it is not visible.
  //
  // IMPORTANT: event listeners must be attached to the modelMenu element
  // directly (via delegation) BEFORE detaching from the DOM.
  // document.querySelectorAll() won't find detached elements, so direct
  // forEach on option buttons won't work after detachment.

  let menuOpen = false;

  function positionAndOpen() {
    const rect = modelTrigger.getBoundingClientRect();
    Object.assign(modelMenu.style, {
      position: "fixed",
      right:    Math.max(0, window.innerWidth - rect.right) + "px",
      bottom:   Math.max(0, window.innerHeight - rect.top + 6) + "px",
    });
    document.body.appendChild(modelMenu);
    menuOpen = true;
  }

  function closeMenu() {
    if (modelMenu.parentNode) modelMenu.parentNode.removeChild(modelMenu);
    menuOpen = false;
  }

  // Use event delegation on modelMenu — listener stays attached even when the
  // element is detached from document (Angular Material does the same).
  modelMenu.addEventListener("click", (e) => {
    e.stopPropagation();
    const opt = e.target.closest(".mat-mdc-menu-item[data-model]");
    if (!opt) return; // click on non-option (e.g. upgrade row)

    const m = opt.dataset.model;

    // Update aria-selected on all siblings (querySelectorAll on the detached
    // element itself works fine since we're querying within modelMenu).
    modelMenu.querySelectorAll(".mat-mdc-menu-item[data-model]").forEach(o => {
      o.setAttribute("aria-selected", o === opt ? "true" : "false");
    });

    closeMenu();

    // Simulate Angular's async change-detection cycle —
    // the trigger label updates after a short delay, exactly as on the real page.
    setTimeout(() => {
      const labels = { flash: "Fast", thinking: "Thinking", pro: "Pro" };
      modelName.textContent = labels[m] || "Fast";
    }, 250);
  });

  // Allow tests to set an initial model via ?model=<key> in the URL.
  // Must run before detach so querySelectorAll still finds the options.
  (function applyInitialModel() {
    const m = new URLSearchParams(window.location.search).get("model");
    if (!m || m === "flash") return;
    const labels = { flash: "Fast", thinking: "Thinking", pro: "Pro" };
    if (!labels[m]) return;
    modelName.textContent = labels[m];
    modelMenu.querySelectorAll(".mat-mdc-menu-item[data-model]").forEach(o => {
      o.setAttribute("aria-selected", o.dataset.model === m ? "true" : "false");
    });
  })();

  // Detach AFTER attaching the delegated listener — menu starts closed.
  modelMenu.parentNode.removeChild(modelMenu);

  modelTrigger.addEventListener("click", (e) => {
    e.stopPropagation();
    menuOpen ? closeMenu() : positionAndOpen();
  });

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && menuOpen) closeMenu();
  });

  // Close on outside click (stopPropagation inside modelMenu prevents false close)
  document.addEventListener("click", () => {
    if (menuOpen) closeMenu();
  });

  // ── Input → send button state ─────────────────────────────────────
  editor.addEventListener("input", () => {
    sendBtn.disabled = editor.innerText.trim().length === 0;
  });

  // ── Chat helpers ──────────────────────────────────────────────────
  function startChat() {
    greeting.classList.add("hidden");
    chipsRow.classList.add("hidden");
  }

  function addMessage(text, role) {
    startChat();
    const wrap = document.createElement("div");
    wrap.className = "msg-wrap";
    const msg  = document.createElement("div");
    msg.className = "msg " + role;

    const av = document.createElement("div");
    av.className = "msg-avatar";
    if (role === "gemini") {
      av.innerHTML = `<svg viewBox="0 0 48 48" width="22" height="22" fill="none">
        <path d="M24 4 C24.8 4 25.5 10 25.2 24 C24.8 10 24 4 24 4Z" fill="#4285f4"/>
        <path d="M24 4 C23.2 4 22.5 10 22.8 24 C23.2 10 24 4 24 4Z" fill="#4285f4"/>
        <path d="M24 44 C24.8 44 25.5 38 25.2 24 C24.8 38 24 44 24 44Z" fill="#fbbc04"/>
        <path d="M24 44 C23.2 44 22.5 38 22.8 24 C23.2 38 24 44 24 44Z" fill="#fbbc04"/>
        <path d="M44 24 C44 24.8 38 25.5 24 25.2 C38 24.8 44 24 44 24Z" fill="#34a853"/>
        <path d="M44 24 C44 23.2 38 22.5 24 22.8 C38 23.2 44 24 44 24Z" fill="#34a853"/>
        <path d="M4 24 C4 24.8 10 25.5 24 25.2 C10 24.8 4 24 4 24Z" fill="#ea4335"/>
        <path d="M4 24 C4 23.2 10 22.5 24 22.8 C10 23.2 4 24 4 24Z" fill="#ea4335"/>
      </svg>`;
    } else {
      av.textContent = "T";
    }

    const body = document.createElement("div");
    body.className = "msg-body";
    body.textContent = text;

    msg.appendChild(av);
    msg.appendChild(body);
    wrap.appendChild(msg);
    chatArea.appendChild(wrap);
    chatArea.scrollTop = chatArea.scrollHeight;
    return body;
  }

  function simulateResponse(userText) {
    startChat();
    const wrap = document.createElement("div");
    wrap.className = "msg-wrap";
    const msg = document.createElement("div");
    msg.className = "msg gemini";

    const av = document.createElement("div");
    av.className = "msg-avatar";
    av.innerHTML = `<svg viewBox="0 0 48 48" width="22" height="22" fill="none">
      <path d="M24 4 C24.8 4 25.5 10 25.2 24 C24.8 10 24 4 24 4Z" fill="#4285f4"/>
      <path d="M24 4 C23.2 4 22.5 10 22.8 24 C23.2 10 24 4 24 4Z" fill="#4285f4"/>
      <path d="M24 44 C24.8 44 25.5 38 25.2 24 C24.8 38 24 44 24 44Z" fill="#fbbc04"/>
      <path d="M24 44 C23.2 44 22.5 38 22.8 24 C23.2 38 24 44 24 44Z" fill="#fbbc04"/>
      <path d="M44 24 C44 24.8 38 25.5 24 25.2 C38 24.8 44 24 44 24Z" fill="#34a853"/>
      <path d="M44 24 C44 23.2 38 22.5 24 22.8 C38 23.2 44 24 44 24Z" fill="#34a853"/>
      <path d="M4 24 C4 24.8 10 25.5 24 25.2 C10 24.8 4 24 4 24Z" fill="#ea4335"/>
      <path d="M4 24 C4 23.2 10 22.5 24 22.8 C10 23.2 4 24 4 24Z" fill="#ea4335"/>
    </svg>`;

    const body = document.createElement("div");
    body.className = "msg-body";
    const dots = document.createElement("div");
    dots.className = "typing-dots";
    dots.innerHTML = "<span></span><span></span><span></span>";
    body.appendChild(dots);

    msg.appendChild(av);
    msg.appendChild(body);
    wrap.appendChild(msg);
    chatArea.appendChild(wrap);
    chatArea.scrollTop = chatArea.scrollHeight;

    const preview = userText.length > 60 ? userText.slice(0, 60) + "…" : userText;
    setTimeout(() => {
      dots.remove();
      body.textContent = `Sure! Here's what I found:\n\n"${preview}"\n\nThis is a demonstration response from the Ask Gemini extension.`;
      chatArea.scrollTop = chatArea.scrollHeight;
    }, 1400);
  }

  // ── Send ──────────────────────────────────────────────────────────
  sendBtn.addEventListener("click", () => {
    const text = editor.innerText.trim();
    if (!text) return;
    addMessage(text, "user");
    editor.innerText = "";
    editor.dispatchEvent(new Event("input", { bubbles: true }));
    simulateResponse(text);
  });

  // ── Signal ready ──────────────────────────────────────────────────
  window.__mockReady = true;
</script>
</body>
</html>
