<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Gemini</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0a;
      --sidebar-bg:#111;
      --surface:   #1e1e1e;
      --surface2:  #2a2a2a;
      --border:    rgba(255,255,255,0.10);
      --text:      #fff;
      --text-dim:  rgba(255,255,255,0.50);
      --accent:    #a8c7fa;
      --user-bubble: #004a77;
      --radius:    28px;
    }

    html, body { height: 100%; font-family: "Google Sans", Roboto, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

    /* ── Shell ── */
    .shell { display: flex; height: 100vh; }

    /* ── Sidebar (icon-only, narrow) ── */
    .sidebar {
      width: 72px; min-width: 72px;
      background: var(--sidebar-bg);
      display: flex; flex-direction: column;
      align-items: center; padding: 12px 0; gap: 4px;
    }
    .sidebar-btn {
      width: 44px; height: 44px; border-radius: 50%;
      background: transparent; border: none; color: var(--text-dim);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.15s, color 0.15s;
    }
    .sidebar-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }

    /* ── Main ── */
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    /* ── Top bar ── */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; flex-shrink: 0;
    }
    .logo-text { font-size: 18px; font-weight: 500; color: var(--text); letter-spacing: -0.2px; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .upgrade-btn {
      display: flex; align-items: center; gap: 6px;
      background: transparent; border: 1px solid rgba(100,200,230,0.5);
      color: #7dd3f7; padding: 7px 16px; border-radius: 20px;
      font: 500 13px "Google Sans", sans-serif; cursor: pointer;
      transition: background 0.15s;
    }
    .upgrade-btn:hover { background: rgba(100,200,230,0.08); }
    .icon-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: transparent; border: none; color: var(--text-dim);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.15s;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.08); }
    .avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: linear-gradient(135deg, #4285f4, #a142f4);
      font-size: 13px; font-weight: 600;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
    }

    /* ── Chat area ── */
    .chat-area {
      flex: 1; overflow-y: auto; display: flex;
      flex-direction: column; align-items: center;
      padding: 24px 0 16px;
    }
    .chat-area::-webkit-scrollbar { width: 6px; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }

    /* ── Greeting ── */
    .greeting {
      display: flex; flex-direction: column; align-items: center;
      gap: 6px; margin: auto 0; text-align: center; padding: 0 24px;
    }
    .greeting.hidden { display: none; }
    .greeting-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 2px;
    }
    .greeting-tag { font-size: 22px; color: var(--text-dim); }
    .greeting-hi  { font-size: 28px; font-weight: 400; color: rgba(255,255,255,0.85); }
    .greeting-sub { font-size: 28px; font-weight: 400; color: var(--text); letter-spacing: -0.3px; }

    /* ── Messages ── */
    .msg-wrap { width: 100%; max-width: 720px; padding: 0 24px; }
    .msg { display: flex; gap: 12px; padding: 12px 0; }
    .msg.user { flex-direction: row-reverse; }
    .msg-avatar {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600;
    }
    .msg.user   .msg-avatar { background: linear-gradient(135deg, #4285f4, #a142f4); }
    .msg.gemini .msg-avatar { background: transparent; }
    .msg-body { max-width: 78%; }
    .msg.user   .msg-body { background: var(--user-bubble); padding: 12px 16px; border-radius: 18px 18px 4px 18px; font-size: 14.5px; line-height: 1.55; }
    .msg.gemini .msg-body { font-size: 14.5px; line-height: 1.7; color: var(--text); padding: 4px 0; }

    /* Typing dots */
    .typing-dots { display: flex; gap: 4px; padding: 6px 0; }
    .typing-dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim); animation: dot-pulse 1.2s ease-in-out infinite; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dot-pulse { 0%,80%,100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

    /* ── Input zone ── */
    .input-zone {
      flex-shrink: 0; padding: 0 20px 20px;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
    }
    .input-container {
      width: 100%; max-width: 700px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); position: relative;
    }
    .input-row {
      display: flex; align-items: center; gap: 6px;
      padding: 10px 10px 10px 14px;
    }

    /* Attach (+) button */
    .attach-btn {
      width: 34px; height: 34px; border-radius: 50%; border: none;
      background: transparent; color: var(--text-dim); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.12s;
    }
    .attach-btn:hover { background: var(--surface2); color: var(--text); }

    /* Editor */
    rich-textarea { flex: 1; display: block; min-width: 0; }
    .ql-editor {
      min-height: 26px; max-height: 180px; overflow-y: auto;
      font: 400 15px/1.5 "Google Sans", sans-serif;
      color: var(--text); outline: none; white-space: pre-wrap; word-break: break-word;
      padding: 4px 0;
    }
    .ql-editor:empty::before { content: "Ask Gemini"; color: var(--text-dim); pointer-events: none; }

    /* Right-side input controls */
    .input-right { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }

    /* Model pill (inside input) */
    .model-pill {
      display: flex; align-items: center; gap: 4px;
      background: transparent; border: 1px solid var(--border);
      color: var(--text); padding: 5px 10px; border-radius: 20px;
      cursor: pointer; font: 500 13px "Google Sans", sans-serif;
      white-space: nowrap; transition: background 0.15s;
    }
    .model-pill:hover { background: var(--surface2); }
    .model-pill svg { opacity: 0.6; flex-shrink: 0; }

    /* Model dropdown (opens upward) */
    .model-menu {
      display: none; position: absolute; bottom: calc(100% + 8px); right: 0;
      background: #2a2a2a; border: 1px solid var(--border);
      border-radius: 16px; min-width: 230px; overflow: hidden;
      box-shadow: 0 -8px 32px rgba(0,0,0,0.5); z-index: 100;
    }
    .model-menu.open { display: block; }
    .model-option {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 16px; cursor: pointer; font-size: 14px;
      transition: background 0.12s; gap: 8px;
    }
    .model-option:hover { background: var(--surface2); }
    .model-option[aria-selected="true"] { color: var(--accent); }
    .model-option[aria-selected="true"] .check { display: block; }
    .check { display: none; color: var(--accent); font-size: 15px; }
    .model-desc { font-size: 11.5px; color: var(--text-dim); margin-top: 2px; }

    /* Send / mic button */
    .send-button {
      width: 38px; height: 38px; border-radius: 50%; border: none; flex-shrink: 0;
      background: transparent; color: var(--text-dim); cursor: default;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, color 0.2s;
    }
    .send-button .icon-send { display: none; }
    .send-button .icon-mic  { display: flex; }
    .send-button:not([disabled]) { background: var(--text); color: #000; cursor: pointer; }
    .send-button:not([disabled]) .icon-send { display: flex; }
    .send-button:not([disabled]) .icon-mic  { display: none; }
    .send-button:not([disabled]):hover { opacity: 0.85; }

    /* ── Chips ── */
    .chips-row {
      display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
      max-width: 700px; width: 100%;
    }
    .chips-row.hidden { display: none; }
    .chip {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); padding: 8px 16px; border-radius: 20px;
      font: 400 13px "Google Sans", sans-serif; cursor: pointer;
      transition: background 0.12s; white-space: nowrap;
    }
    .chip:hover { background: var(--surface2); }
  </style>
</head>
<body>
<div class="shell">

  <!-- ── Narrow icon sidebar ── -->
  <aside class="sidebar">
    <button class="sidebar-btn" title="Menu">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
    </button>
    <button class="sidebar-btn" title="New chat">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </aside>

  <!-- ── Main ── -->
  <div class="main">

    <!-- Top bar -->
    <div class="topbar">
      <span class="logo-text">Gemini</span>
      <div class="topbar-right">
        <button class="upgrade-btn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg>
          Upgrade to Google AI Plus
        </button>
        <button class="icon-btn" title="Fullscreen">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <!-- Profile avatar — gradient circle with "U" (same as popup mock) -->
        <div class="avatar">U</div>
      </div>
    </div>

    <!-- Chat area (greeting + messages) -->
    <div class="chat-area" id="chatArea">
      <div class="greeting" id="greeting">
        <div class="greeting-row">
          <!-- Gemini 4-colour star -->
          <svg width="32" height="32" viewBox="0 0 48 48" fill="none">
            <path d="M24 4 C24.8 4 25.5 10 25.2 24 C24.8 10 24 4 24 4Z" fill="#4285f4" stroke="#4285f4" stroke-width="0.5"/>
            <path d="M24 4 C23.2 4 22.5 10 22.8 24 C23.2 10 24 4 24 4Z" fill="#4285f4" stroke="#4285f4" stroke-width="0.5"/>
            <path d="M24 44 C24.8 44 25.5 38 25.2 24 C24.8 38 24 44 24 44Z" fill="#fbbc04" stroke="#fbbc04" stroke-width="0.5"/>
            <path d="M24 44 C23.2 44 22.5 38 22.8 24 C23.2 38 24 44 24 44Z" fill="#fbbc04" stroke="#fbbc04" stroke-width="0.5"/>
            <path d="M44 24 C44 24.8 38 25.5 24 25.2 C38 24.8 44 24 44 24Z" fill="#34a853" stroke="#34a853" stroke-width="0.5"/>
            <path d="M44 24 C44 23.2 38 22.5 24 22.8 C38 23.2 44 24 44 24Z" fill="#34a853" stroke="#34a853" stroke-width="0.5"/>
            <path d="M4 24 C4 24.8 10 25.5 24 25.2 C10 24.8 4 24 4 24Z" fill="#ea4335" stroke="#ea4335" stroke-width="0.5"/>
            <path d="M4 24 C4 23.2 10 22.5 24 22.8 C10 23.2 4 24 4 24Z" fill="#ea4335" stroke="#ea4335" stroke-width="0.5"/>
          </svg>
          <span class="greeting-hi">Hi User</span>
        </div>
        <span class="greeting-sub">Where should we start?</span>
      </div>
    </div>

    <!-- Input zone -->
    <div class="input-zone">

      <div class="input-container" data-node-type="input-area">
        <div class="input-row">
          <!-- Attach button -->
          <button class="attach-btn" title="Attach files">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>

          <!-- Contenteditable input (required by content.js) -->
          <rich-textarea>
            <div
              class="ql-editor"
              contenteditable="true"
              role="textbox"
              aria-label="Ask Gemini"
              aria-multiline="true"
            ></div>
          </rich-textarea>

          <div class="input-right">
            <!-- Model picker — content.js targets data-test-id="bard-mode-menu-button" -->
            <div style="position:relative">
              <button class="model-pill" data-test-id="bard-mode-menu-button" aria-label="Open mode picker" id="modelTrigger">
                <div data-test-id="logo-pill-label-container" id="modelLabel">
                  <span id="modelName">Flash</span>
                </div>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </button>

              <!-- Dropdown — options use role="option" as required by content.js -->
              <div class="model-menu" id="modelMenu">
                <div class="model-option" role="option" aria-selected="true" data-model="flash" id="opt-flash">
                  <div>
                    <div>Gemini 2.0 Flash</div>
                    <div class="model-desc">Fast and versatile</div>
                  </div>
                  <span class="check">✓</span>
                </div>
                <div class="model-option" role="option" aria-selected="false" data-model="thinking" id="opt-thinking">
                  <div>
                    <div>Gemini 2.0 Flash Thinking</div>
                    <div class="model-desc">Advanced reasoning</div>
                  </div>
                  <span class="check">✓</span>
                </div>
                <div class="model-option" role="option" aria-selected="false" data-model="pro" id="opt-pro">
                  <div>
                    <div>Gemini Advanced Pro</div>
                    <div class="model-desc">Most capable</div>
                  </div>
                  <span class="check">✓</span>
                </div>
              </div>
            </div>

            <!-- Send button (shows mic icon when empty, arrow when text present) -->
            <button class="send-button" aria-label="Send message" id="sendBtn" disabled>
              <span class="icon-send" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 19V5M5 12l7-7 7 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </span>
              <span class="icon-mic" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="9" y="2" width="6" height="12" rx="3" stroke="currentColor" stroke-width="1.8"/><path d="M5 10a7 7 0 0014 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="12" y1="19" x2="12" y2="22" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
              </span>
            </button>
          </div>
        </div>
      </div>

      <!-- Action chips (visible until first message is sent) -->
      <div class="chips-row" id="chipsRow">
        <button class="chip">🖼️ Create image</button>
        <button class="chip">🎵 Create music</button>
        <button class="chip">Help me learn</button>
        <button class="chip">Write anything</button>
        <button class="chip">Boost my day</button>
      </div>

    </div><!-- .input-zone -->
  </div><!-- .main -->
</div><!-- .shell -->

<script>
  const editor      = document.querySelector(".ql-editor");
  const sendBtn     = document.getElementById("sendBtn");
  const chatArea    = document.getElementById("chatArea");
  const greeting    = document.getElementById("greeting");
  const chipsRow    = document.getElementById("chipsRow");
  const modelTrigger = document.getElementById("modelTrigger");
  const modelMenu   = document.getElementById("modelMenu");
  const modelName   = document.getElementById("modelName");

  // ── Model picker ──────────────────────────────────────────────────
  modelTrigger.addEventListener("click", (e) => {
    e.stopPropagation();
    modelMenu.classList.toggle("open");
  });
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") modelMenu.classList.remove("open");
  });
  document.addEventListener("click", () => modelMenu.classList.remove("open"));

  document.querySelectorAll(".model-option").forEach(opt => {
    opt.addEventListener("click", (e) => {
      e.stopPropagation();
      const m = opt.dataset.model;
      document.querySelectorAll(".model-option").forEach(o => {
        o.setAttribute("aria-selected", o === opt ? "true" : "false");
      });
      const labels = { flash: "Flash", thinking: "Flash Thinking", pro: "Advanced" };
      modelName.textContent = labels[m] || "Flash";
      modelMenu.classList.remove("open");
    });
  });

  // ── Input → send button state ─────────────────────────────────────
  editor.addEventListener("input", () => {
    sendBtn.disabled = editor.innerText.trim().length === 0;
  });

  // ── Chat helpers ──────────────────────────────────────────────────
  function startChat() {
    greeting.classList.add("hidden");
    chipsRow.classList.add("hidden");
  }

  function addMessage(text, role) {
    startChat();
    const wrap = document.createElement("div");
    wrap.className = "msg-wrap";
    const msg = document.createElement("div");
    msg.className = "msg " + role;

    const av = document.createElement("div");
    av.className = "msg-avatar";
    if (role === "gemini") {
      av.innerHTML = `<svg viewBox="0 0 48 48" width="24" height="24" fill="none">
        <path d="M24 4 C24.8 4 25.5 10 25.2 24 C24.8 10 24 4 24 4Z" fill="#4285f4"/>
        <path d="M24 4 C23.2 4 22.5 10 22.8 24 C23.2 10 24 4 24 4Z" fill="#4285f4"/>
        <path d="M24 44 C24.8 44 25.5 38 25.2 24 C24.8 38 24 44 24 44Z" fill="#fbbc04"/>
        <path d="M24 44 C23.2 44 22.5 38 22.8 24 C23.2 38 24 44 24 44Z" fill="#fbbc04"/>
        <path d="M44 24 C44 24.8 38 25.5 24 25.2 C38 24.8 44 24 44 24Z" fill="#34a853"/>
        <path d="M44 24 C44 23.2 38 22.5 24 22.8 C38 23.2 44 24 44 24Z" fill="#34a853"/>
        <path d="M4 24 C4 24.8 10 25.5 24 25.2 C10 24.8 4 24 4 24Z" fill="#ea4335"/>
        <path d="M4 24 C4 23.2 10 22.5 24 22.8 C10 23.2 4 24 4 24Z" fill="#ea4335"/>
      </svg>`;
    } else {
      av.textContent = "U";
    }

    const body = document.createElement("div");
    body.className = "msg-body";
    body.textContent = text;

    msg.appendChild(av);
    msg.appendChild(body);
    wrap.appendChild(msg);
    chatArea.appendChild(wrap);
    chatArea.scrollTop = chatArea.scrollHeight;
    return body;
  }

  function simulateResponse(userText) {
    startChat();
    const wrap = document.createElement("div");
    wrap.className = "msg-wrap";
    const msg = document.createElement("div");
    msg.className = "msg gemini";

    const av = document.createElement("div");
    av.className = "msg-avatar";
    av.innerHTML = `<svg viewBox="0 0 48 48" width="24" height="24" fill="none">
      <path d="M24 4 C24.8 4 25.5 10 25.2 24 C24.8 10 24 4 24 4Z" fill="#4285f4"/>
      <path d="M24 4 C23.2 4 22.5 10 22.8 24 C23.2 10 24 4 24 4Z" fill="#4285f4"/>
      <path d="M24 44 C24.8 44 25.5 38 25.2 24 C24.8 38 24 44 24 44Z" fill="#fbbc04"/>
      <path d="M24 44 C23.2 44 22.5 38 22.8 24 C23.2 38 24 44 24 44Z" fill="#fbbc04"/>
      <path d="M44 24 C44 24.8 38 25.5 24 25.2 C38 24.8 44 24 44 24Z" fill="#34a853"/>
      <path d="M44 24 C44 23.2 38 22.5 24 22.8 C38 23.2 44 24 44 24Z" fill="#34a853"/>
      <path d="M4 24 C4 24.8 10 25.5 24 25.2 C10 24.8 4 24 4 24Z" fill="#ea4335"/>
      <path d="M4 24 C4 23.2 10 22.5 24 22.8 C10 23.2 4 24 4 24Z" fill="#ea4335"/>
    </svg>`;

    const body = document.createElement("div");
    body.className = "msg-body";
    const dots = document.createElement("div");
    dots.className = "typing-dots";
    dots.innerHTML = "<span></span><span></span><span></span>";
    body.appendChild(dots);

    msg.appendChild(av);
    msg.appendChild(body);
    wrap.appendChild(msg);
    chatArea.appendChild(wrap);
    chatArea.scrollTop = chatArea.scrollHeight;

    const preview = userText.length > 60 ? userText.slice(0, 60) + "…" : userText;
    setTimeout(() => {
      dots.remove();
      body.textContent = `Sure! Here's what I found:\n\n"${preview}"\n\nThis is a demonstration response from the Ask Gemini extension.`;
      chatArea.scrollTop = chatArea.scrollHeight;
    }, 1400);
  }

  // ── Send ──────────────────────────────────────────────────────────
  sendBtn.addEventListener("click", () => {
    const text = editor.innerText.trim();
    if (!text) return;
    addMessage(text, "user");
    editor.innerText = "";
    editor.dispatchEvent(new Event("input", { bubbles: true }));
    simulateResponse(text);
  });

  // ── Signal ready ──────────────────────────────────────────────────
  window.__mockReady = true;
</script>
</body>
</html>
