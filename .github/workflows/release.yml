name: Build and Release Extension

on:
  push:
    tags:
      - 'v[0-9].[0-9]*.[0-9]*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    container: alpine:latest
    permissions:
      contents: write

    steps:
      - name: Install dependencies (Alpine)
        run: |
          apk add --no-cache git zip jq bash

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag format: $TAG"
            exit 1
          fi

      - name: Update Manifest Version
        run: |
          NEW_VERSION=$(echo ${{ github.ref_name }} | sed 's/^v//')
          jq ".version = \"$NEW_VERSION\"" manifest.json > manifest.tmp && mv manifest.tmp manifest.json

      - name: Commit and Push Version Bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "chore: bump version to ${{ github.ref_name }} [skip ci]"
          git push origin HEAD:main

      - name: Generate Manual Changelog
        run: |
          chmod +x generate-changelog.sh
          ./generate-changelog.sh
          test -s CHANGELOG.md

      - name: Run Packaging Script
        run: |
          set -euo pipefail
          chmod +x package.sh
          ./package.sh
          test -s ask-gemini-extension.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body_path: CHANGELOG.md
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: ask-gemini-extension.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}